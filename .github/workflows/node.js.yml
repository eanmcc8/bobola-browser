name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version: [22.x]
        # Supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Fix audit issues
        run: npm audit --fix

      - name: Build project (if applicable)
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Start app (if applicable)
        run: npm start --if-present

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Configure Git for committing
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit all changes including node_modules
        run: |
          git add .
          git commit -m "CI: Install dependencies and update files" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Node Formatter
        uses: beauwilliams/run-node-formatter@latest
        with:
          env: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Format Script
        run: npm run format --if-present

      - name: AIOLint Linter
        uses: jonesroot/aiolint-action@1.0.0-beta
